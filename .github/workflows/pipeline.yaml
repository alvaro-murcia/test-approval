name: CI Pipeline

on:
  workflow_dispatch: # Indica que la ejecución es manual


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Construir proyecto
        run: echo "Construyendo proyecto..."

      - name: Ejecutar tests
        run: echo "Ejecutando tests..."
  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: test-approval # Pongo el environment que contiene los Required reviewers

    steps:
      - name: Despliegue
        run: echo "Desplegando..."